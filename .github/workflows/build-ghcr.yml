name: Build & Publish Docker image (GHCR, fork)

# Fork 专用：推送到 ghcr.io/<owner>/new-api。
# - push 到 main 自动构建并打 :latest + :main + :main-<date>-<sha>
# - workflow_dispatch 可手动指定任意 ref/image_tag
# 与 upstream 的 docker-image-{nightly,alpha}.yml / docker-build.yml 完全独立，
# 不影响 pull upstream 的合并；如需停用直接删除本文件即可。

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - "LICENSE"
  workflow_dispatch:
    inputs:
      ref:
        description: "要构建的分支或 tag（默认当前分支）"
        required: false
        default: ""
      image_tag:
        description: "镜像 tag 前缀（默认用分支名 + 短 commit）"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/new-api

jobs:
  build_single_arch:
    name: Build & push (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 1

      - name: Compute version
        id: version
        shell: bash
        run: |
          BRANCH="${{ inputs.ref || github.ref_name }}"
          BRANCH="${BRANCH##refs/heads/}"
          BRANCH="${BRANCH##refs/tags/}"
          # 把 / 替换为 - 以适配 docker tag 规范
          BRANCH_SAFE="${BRANCH//\//-}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +'%Y%m%d')
          if [ -n "${{ inputs.image_tag }}" ]; then
            VERSION="${{ inputs.image_tag }}"
          else
            VERSION="${BRANCH_SAFE}-${DATE}-${SHORT_SHA}"
          fi
          # push 到 main（不是手动指定其他 ref）时打 :latest
          IS_LATEST=false
          if [ "${{ github.event_name }}" = "push" ] && [ "$BRANCH_SAFE" = "main" ] && [ -z "${{ inputs.ref }}" ]; then
            IS_LATEST=true
          fi
          echo "$VERSION" > VERSION
          echo "branch=$BRANCH_SAFE" >> $GITHUB_OUTPUT
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "is_latest=$IS_LATEST" >> $GITHUB_OUTPUT
          echo "Publishing $VERSION (${{ matrix.arch }}) is_latest=$IS_LATEST"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: imgname
        shell: bash
        run: |
          NAME="${{ env.IMAGE_NAME }}"
          echo "value=${NAME,,}" >> $GITHUB_OUTPUT

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          REG_IMG="${{ env.REGISTRY }}/${{ steps.imgname.outputs.value }}"
          ARCH="${{ matrix.arch }}"
          TAGS="$REG_IMG:${{ steps.version.outputs.branch }}-$ARCH"
          TAGS="$TAGS"$'\n'"$REG_IMG:${{ steps.version.outputs.value }}-$ARCH"
          if [ "${{ steps.version.outputs.is_latest }}" = "true" ]; then
            TAGS="$TAGS"$'\n'"$REG_IMG:latest-$ARCH"
          fi
          {
            echo 'value<<EOF'
            echo "$TAGS"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Build & push single-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.tags.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          provenance: false
          sbom: false

  create_manifest:
    name: Create multi-arch manifest
    needs: [build_single_arch]
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 1

      - name: Compute version
        id: version
        shell: bash
        run: |
          BRANCH="${{ inputs.ref || github.ref_name }}"
          BRANCH="${BRANCH##refs/heads/}"
          BRANCH="${BRANCH##refs/tags/}"
          BRANCH_SAFE="${BRANCH//\//-}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +'%Y%m%d')
          if [ -n "${{ inputs.image_tag }}" ]; then
            VERSION="${{ inputs.image_tag }}"
          else
            VERSION="${BRANCH_SAFE}-${DATE}-${SHORT_SHA}"
          fi
          IS_LATEST=false
          if [ "${{ github.event_name }}" = "push" ] && [ "$BRANCH_SAFE" = "main" ] && [ -z "${{ inputs.ref }}" ]; then
            IS_LATEST=true
          fi
          echo "branch=$BRANCH_SAFE" >> $GITHUB_OUTPUT
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "is_latest=$IS_LATEST" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: imgname
        shell: bash
        run: |
          NAME="${{ env.IMAGE_NAME }}"
          echo "value=${NAME,,}" >> $GITHUB_OUTPUT

      - name: Create & push branch manifest (multi-arch)
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ steps.imgname.outputs.value }}:${{ steps.version.outputs.branch }} \
            ${{ env.REGISTRY }}/${{ steps.imgname.outputs.value }}:${{ steps.version.outputs.branch }}-amd64 \
            ${{ env.REGISTRY }}/${{ steps.imgname.outputs.value }}:${{ steps.version.outputs.branch }}-arm64

      - name: Create & push versioned manifest (multi-arch)
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ steps.imgname.outputs.value }}:${{ steps.version.outputs.value }} \
            ${{ env.REGISTRY }}/${{ steps.imgname.outputs.value }}:${{ steps.version.outputs.value }}-amd64 \
            ${{ env.REGISTRY }}/${{ steps.imgname.outputs.value }}:${{ steps.version.outputs.value }}-arm64

      - name: Create & push latest manifest (multi-arch)
        if: steps.version.outputs.is_latest == 'true'
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ steps.imgname.outputs.value }}:latest \
            ${{ env.REGISTRY }}/${{ steps.imgname.outputs.value }}:latest-amd64 \
            ${{ env.REGISTRY }}/${{ steps.imgname.outputs.value }}:latest-arm64

      - name: Summary
        run: |
          echo "## Build complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch tag:** \`${{ env.REGISTRY }}/${{ steps.imgname.outputs.value }}:${{ steps.version.outputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Versioned tag:** \`${{ env.REGISTRY }}/${{ steps.imgname.outputs.value }}:${{ steps.version.outputs.value }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.version.outputs.is_latest }}" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Latest tag:** \`${{ env.REGISTRY }}/${{ steps.imgname.outputs.value }}:latest\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull: \`docker pull ${{ env.REGISTRY }}/${{ steps.imgname.outputs.value }}:${{ steps.version.outputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
